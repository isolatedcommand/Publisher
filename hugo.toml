# Theme-level configuration merged into every child site.
[module]
  [module.hugoVersion]
    extended = true
    min = '0.147.2'

[mediaTypes]
  [mediaTypes."application/manifest+json"]
    suffixes = ["webmanifest"]

[outputFormats]
  [outputFormats.WebAppManifest]
    mediaType = "application/manifest+json"
    rel = "manifest"

####################### theme default brand identity ######################
# Keycap identity shipped by the theme: banner logo (white "isolated" key +
# lime "command" key) and the square i/c mark. Child sites inherit these by
# default and may override with their own assets/params.
[params]
logo = "images/logo.svg"              # banner logo, dark-header variant
logo_darkmode = "images/logo-dark.svg" # banner logo for light surfaces
logo_square = "images/logo-square.svg" # square i/c mark (social, manifest)
logo_width = "220px"
favicon = "images/favicon.png"        # rasterised square mark

####################### theme default site variables ######################
# Default colors/fonts so the SCSS compiles out of the box. Child sites may
# override any of these in their own [params.variables].
[params.variables]
color_primary = "#7BE43C"
body_color = "#fff"
text_color = "white"
text_red = "red"
text_blue = "#3272c8"
text_dark = "white"
text_light = "white"
border_color = "white"
black = "#000000"
white = "#fff"
light = "white"
font_size = "15px"
font_scale = "1.25"
font_primary = "Inter:wght@400;500;600"
font_primary_type = "sans-serif"
font_secondary = "Space+Grotesk:wght@500;600;700"
font_secondary_type = "sans-serif"
font_icon = "Font Awesome 5 Free"

############################# theme default plugins ##########################
[[params.plugins.css]]
link = "plugins/bootstrap/bootstrap.min.css"
[[params.plugins.css]]
link = "plugins/slick/slick.css"
[[params.plugins.css]]
link = "plugins/font-awesome/fontawesome.min.css"
[[params.plugins.css]]
link = "plugins/font-awesome/brands.css"
[[params.plugins.css]]
link = "plugins/font-awesome/solid.css"
[[params.plugins.js]]
link = "plugins/jquery/jquery.min.js"
[[params.plugins.js]]
link = "plugins/bootstrap/bootstrap.min.js"
[[params.plugins.js]]
link = "plugins/slick/slick.min.js"
[[params.plugins.js]]
link = "plugins/shuffle/shuffle.min.js"
[[params.plugins.js]]
link = "plugins/google-map/gmap.js"
[[params.plugins.js]]
link = "plugins/webfont-loader/webfont-loader-2.min.js"
