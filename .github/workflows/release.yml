# Publisher release fan-out.
#
# Push a tag like v0.14.0 and this notifies every child site repo, whose own
# `publisher-bump.yml` workflow bumps go.mod to the new version, commits and
# pushes — Cloudflare then rebuilds and deploys each site automatically.
#
# One-time setup: create a fine-grained PAT with `contents: read/write` on the
# child repos (or a classic PAT with `repo` scope) and store it in this repo:
#   gh secret set DISPATCH_TOKEN --repo isolatedcommand/Publisher
name: release

on:
  push:
    tags:
      - "v*"

jobs:
  fan-out:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repo:
          - isolatedcommand/isolatedcommand.com
          - isolatedcommand/publisher.devcomm
          - isolatedcommand/Go
          - isolatedcommand/volunteer
          - conanzhangtech/File
    steps:
      - name: Dispatch publisher-release to ${{ matrix.repo }}
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: |
          gh api "repos/${{ matrix.repo }}/dispatches" \
            --method POST \
            --field event_type=publisher-release \
            --field "client_payload[version]=${GITHUB_REF_NAME}"
